services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: fastapi_app
    command: uv run uvicorn app.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: postgres_db
    env_file:
      - backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
